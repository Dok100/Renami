[project]
name = "<PROJECT_SLUG>"
version = "0.1.0"
description = "Python starter generated from the Codex-Projekt-Framework."
readme = "README.md"
requires-python = ">=3.11"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]
