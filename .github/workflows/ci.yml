name: CI

on:
  push:
  pull_request:

jobs:
  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: |
          if /usr/bin/arch -arm64 /usr/bin/true >/dev/null 2>&1 && [ -x /opt/homebrew/bin/brew ]; then
            /usr/bin/arch -arm64 /opt/homebrew/bin/brew install xcodegen swiftformat
          else
            brew install xcodegen swiftformat
          fi

      - name: Project checks
        run: make check

      - name: Generate project
        run: make generate

      - name: Lint
        run: make lint

      - name: Security
        run: make security

      - name: Test
        run: make test
