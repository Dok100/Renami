name: CI

on:
  push:
  pull_request:

jobs:
  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen swiftformat

      - name: Project checks
        run: make check

      - name: Generate project
        run: make generate

      - name: Lint
        run: make lint

      - name: Security
        run: make security

      - name: Test
        run: make test
