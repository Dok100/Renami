name: CodeQL

on:
  push:
    branches: ["main", "master"]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  analyze:
    runs-on: macos-15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["swift"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: make generate

      - name: Build
        run: xcodebuild build -scheme Renami -destination 'platform=macOS' -derivedDataPath .build/DerivedData

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
