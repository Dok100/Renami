name: CodeQL

on:
  push:
    branches: ["main", "master"]
    paths:
      - ".github/workflows/codeql.yml"
      - "Makefile"
      - "project.yml"
      - "Sources/**"
      - "Tests/**"
      - "tests/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/codeql.yml"
      - "Makefile"
      - "project.yml"
      - "Sources/**"
      - "Tests/**"
      - "tests/**"
      - "scripts/**"
  schedule:
    - cron: "0 4 * * 1"

jobs:
  analyze:
    runs-on: macos-15
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["swift"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Install XcodeGen
        run: |
          if /usr/bin/arch -arm64 /usr/bin/true >/dev/null 2>&1 && [ -x /opt/homebrew/bin/brew ]; then
            /usr/bin/arch -arm64 /opt/homebrew/bin/brew install xcodegen
          else
            brew install xcodegen
          fi

      - name: Generate project
        run: make generate

      - name: Build
        run: xcodebuild build -scheme Renami -destination 'platform=macOS' -derivedDataPath .build/DerivedData

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
